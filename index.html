<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Web App | javascript</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container">
      <div class="app-title">
        <a href="">Budget<b>App</b></a>
      </div>
      <div class="budget-header">
        <div class="balance">
          <div class="title">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard">
        <div class="dash-title">Dashboard</div>
        <div class="toggle">
          <div class="first-tab">Expenses</div>
          <div class="second-tab">Income</div>
          <div class="third-tab focus">All</div>
        </div>
        <div class="hide" id="expense">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              maxlength="60"
              autocomplete="off"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
              min="0.01"
              step="0.01"
              inputmode="decimal"
            />
            <div
              class="add-expense"
              role="button"
              tabindex="0"
              aria-label="Add expense"
            ><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div class="hide" id="income">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              maxlength="60"
              autocomplete="off"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
              min="0.01"
              step="0.01"
              inputmode="decimal"
            />
            <div
              class="add-income"
              role="button"
              tabindex="0"
              aria-label="Add income"
            ><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div id="all">
          <ul class="list"></ul>
        </div>
      </div>
    </div>
    <div
      class="modal-overlay hide"
      id="alert-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="alert-modal-title"
      aria-describedby="alert-modal-message"
    >
      <div class="modal" role="document">
        <h2 class="modal-title" id="alert-modal-title">Notice</h2>
        <p class="modal-message" id="alert-modal-message"></p>
        <button class="modal-ok" id="alert-modal-ok" type="button">OK</button>
      </div>
    </div>
    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
