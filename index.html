<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Web App | javascript</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container">
      <div class="app-title">
        <a href="">Budget<b>App</b></a>
      </div>
      <div class="budget-header">
        <div class="balance">
          <div class="title">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard">
        <div class="dash-title">Dashboard</div>
        <div class="toggle" role="tablist" aria-label="Entry views">
          <button
            class="first-tab"
            id="expense-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="expense"
            tabindex="-1"
          >
            Expenses
          </button>
          <button
            class="second-tab"
            id="income-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="income"
            tabindex="-1"
          >
            Income
          </button>
          <button
            class="third-tab focus"
            id="all-tab"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="all"
            tabindex="0"
          >
            All
          </button>
        </div>
        <div
          class="hide"
          id="expense"
          role="tabpanel"
          aria-labelledby="expense-tab"
          hidden
        >
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              maxlength="60"
              autocomplete="off"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
              min="0.01"
              step="0.01"
              inputmode="decimal"
            />
            <button
              class="add-expense"
              type="button"
              aria-label="Add expense"
            >
              <img src="icon/plus.png" alt="" />
            </button>
          </div>
        </div>
        <div
          class="hide"
          id="income"
          role="tabpanel"
          aria-labelledby="income-tab"
          hidden
        >
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              maxlength="60"
              autocomplete="off"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
              min="0.01"
              step="0.01"
              inputmode="decimal"
            />
            <button
              class="add-income"
              type="button"
              aria-label="Add income"
            >
              <img src="icon/plus.png" alt="" />
            </button>
          </div>
        </div>
        <div id="all" role="tabpanel" aria-labelledby="all-tab">
          <ul class="list"></ul>
        </div>
      </div>
      <footer class="budget-footer" aria-label="Application footer">
        <span class="footer-logo" aria-hidden="true">
          <svg
            viewBox="0 0 32 32"
            width="22"
            height="22"
            xmlns="http://www.w3.org/2000/svg"
            focusable="false"
          >
            <rect
              x="2"
              y="2"
              width="28"
              height="28"
              rx="9"
              fill="currentColor"
              fill-opacity="0.18"
            />
            <path
              d="M16 8.5v15M12 13a3 3 0 013-3h3.5M20 19a3 3 0 01-3 3h-4.5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
        </span>
        <span class="footer-text">
          <span class="footer-brand">Budget<b>App</b></span>
          <span class="footer-meta">© 2026 · Group 59 · CPT304</span>
        </span>
      </footer>
    </div>
    <div
      class="modal-overlay hide"
      id="alert-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="alert-modal-title"
      aria-describedby="alert-modal-message"
    >
      <div class="modal" role="document">
        <h2 class="modal-title" id="alert-modal-title">Notice</h2>
        <p class="modal-message" id="alert-modal-message"></p>
        <button class="modal-ok" id="alert-modal-ok" type="button">OK</button>
      </div>
    </div>
    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
